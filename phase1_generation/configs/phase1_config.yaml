network:
  name: "case500_goc" # Name of the power grid network (without extension)
  source: "pglib" # Data source for the grid; options: pglib, file
  # WARNING: the following parameter is only used if source is "file"
  network_dir: "scripts/grids" # if using source "file", this is the directory containing the network file

load:
  generator: "precomputed_profile" # Name of the load generator; options: agg_load_profile, powergraph
  agg_profile: "" # Name of the aggregated load profile
  scenario_file: "phase1_generation/preprocessing/case500_goc_3yr_precomputed_load_profiles.csv" # precomputed scenarios (cols: load_scenario, load, p_mw, q_mvar)
  scenarios: 26280 #* Number of different load scenarios to generate
  # WARNING: the following parameters are only used if generator is "agg_load_profile"
  # if using generator "powergraph", these parameters are ignored
  sigma: 0.00 #* max local noise
  change_reactive_power: true # If true, changes reactive power of loads. If False, keeps the ones from the case file
  global_range: 0.4 # Range of the global scaling factor. used to set the lower bound of the scaling factor
  max_scaling_factor: 1.2 #* Max upper bound of the global scaling factor
  step_size: 0.1 # Step size when finding the upper bound of the global scaling factor
  start_scaling_factor: 1.0 # Initial value of the global scaling factor

topology_perturbation:
  type: "none"

generation_perturbation:
  type: "none"

admittance_perturbation:
  type: "none"

settings:
  num_processes: 4 # Number of parallel processes to use
  data_dir: "/data/horse/ws/tibo990i-thesis_data/phase_1a/data_out/3yr_2019-2021/case14_ieee" #* Directory to save generated data relative to CWD
  large_chunk_size: 1000 # Number of load scenarios processed before saving
  overwrite: true # If true, overwrites existing files, if false, appends to files
  mode: "opf" # Mode of the script; options: pf, opf
  include_dc_res: false # If true, also stores the results of dc power flow or dc optimal power flow
  enable_solver_logs: true # If true, write OPF/PF logs to {data_dir}/solver_log
  pf_fast: true # Whether to use fast PF solver by default
  dcpf_fast: true # Whether to use fast DCPF solver by default
  max_iter: 200 # Max iterations for Ipopt-based solvers
